[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sli-ui-toolkit"
version = "0.1.0"
description = "Reusable PyQt UI toolkit primitives for SLI desktop tools."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PyQt6>=6.6",
]

[tool.setuptools.packages.find]
where = ["src"]
