name: Build Windows

on:
  workflow_dispatch:
    inputs:
      console:
        description: "Console subsystem (debug startup crashes)"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate metadata
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Release Metadata
        shell: pwsh
        run: |
          python build/ci/validate_release_metadata.py
          python build/ci/validate_license_files.py

  tests:
    name: Run tests
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-tests-${{ hashFiles('requirements-gui.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-tests-
            ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements-gui.txt") {
            pip install -r requirements-gui.txt
          }
          if (Test-Path "requirements-dev.txt") {
            pip install -r requirements-dev.txt
          }

      - name: Run Pytest
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests --maxfail=1 -q

  build-bundle:
    name: Build PyInstaller bundle
    runs-on: windows-latest
    needs: [validate, tests]
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-build-${{ hashFiles('requirements-gui.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-build-
            ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements-gui.txt") {
            pip install -r requirements-gui.txt
          }
          pip install --upgrade pyinstaller

      - name: Build PyInstaller Bundle And Fetch FFmpeg
        shell: pwsh
        env:
          BUILD_INNO_SETUP: "0"
          BUILD_CONSOLE: ${{ github.event.inputs.console == 'true' && '1' || '0' }}
        run: |
          python build/Windows-template/build_windows.py

      - name: Verify Windows License Bundle
        shell: pwsh
        run: |
          python build/ci/validate_license_files.py --windows-bundle dist/Improve_ImgSLI

      - name: Verify Windows QRhi Shaders
        shell: pwsh
        run: |
          python build/ci/validate_windows_shaders.py --windows-bundle dist/Improve_ImgSLI

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Improve_ImgSLI_windows_bundle${{ github.event.inputs.console == 'true' && '_console' || '' }}
          path: dist/Improve_ImgSLI/**
          if-no-files-found: error

  installer:
    name: Build Inno Setup installer
    runs-on: windows-latest
    needs: build-bundle
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: Improve_ImgSLI_windows_bundle${{ github.event.inputs.console == 'true' && '_console' || '' }}
          path: dist/Improve_ImgSLI

      - name: Build Inno Setup Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: build/Windows-template/inno_setup_6.iss

      - name: Verify Installer License Pages
        shell: pwsh
        run: |
          python build/ci/validate_license_files.py

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Improve_ImgSLI_windows_installer
          path: build/Windows-template/Output/*.exe
          if-no-files-found: error
